<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление ✈ Кольцово SVX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0e17; color: #e2e8f0; min-height: 100vh;
            padding: 40px;
        }
        h1 { color: #f0c040; margin-bottom: 30px; }
        .card {
            background: #111827; border: 1px solid #1e293b;
            border-radius: 12px; padding: 30px; margin-bottom: 30px;
        }
        h2 { color: #f0c040; margin-bottom: 20px; }
        .grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px; margin-bottom: 20px;
        }
        .field { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.8rem; text-transform: uppercase; color: #94a3b8; }
        input {
            background: #0a0e17; border: 1px solid #1e293b; color: #e2e8f0;
            padding: 10px; border-radius: 8px; font-size: 0.95rem;
        }
        button {
            padding: 12px 24px; border: none; border-radius: 8px;
            font-weight: 600; cursor: pointer; font-size: 0.9rem;
        }
        .btn-save { background: #f0c040; color: #000; }
        .btn-del {
            background: transparent; border: 1px solid #ef4444;
            color: #ef4444; padding: 6px 12px; border-radius: 6px; cursor: pointer;
        }
        .item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px; background: #0a0e17; border-radius: 8px; margin-bottom: 10px;
        }
        .msg {
            position: fixed; bottom: 30px; right: 30px;
            padding: 14px 24px; border-radius: 10px; color: white; font-weight: 600;
        }
    </style>
</head>
<body>
    <h1>🔧 Управление рейсами | Кольцово SVX</h1>
    <a href="/" style="color:#f0c040;">← На табло</a>

    <div class="card" style="margin-top:20px;">
        <h2 id="formTitle">➕ Добавить рейс</h2>
        <form onsubmit="save(event)">
            <input type="hidden" id="editId">
            <div class="grid">
                <div class="field"><label>Авиакомпания</label><input id="airline" required></div>
                <div class="field"><label>Номер рейса</label><input id="flightNumber" required></div>
                <div class="field"><label>Город</label><input id="destination" required></div>
                <div class="field"><label>IATA</label><input id="iata" maxlength="3" required></div>
            </div>
            <div class="grid">
                <div class="field"><label>Регистрация с</label><input type="time" id="checkInStart" required></div>
                <div class="field"><label>Регистрация до</label><input type="time" id="checkInEnd" required></div>
                <div class="field"><label>Посадка с</label><input type="time" id="boardingStart" required></div>
                <div class="field"><label>Посадка до</label><input type="time" id="boardingEnd" required></div>
                <div class="field"><label>Вылет</label><input type="time" id="departureTime" required></div>
            </div>
            <div class="grid">
                <div class="field"><label>Стойки</label><input id="checkInDesks"></div>
                <div class="field"><label>Выход</label><input id="gate"></div>
                <div class="field"><label>Дата</label><input type="date" id="date" required></div>
            </div>
            <button type="submit" class="btn-save" id="submitBtn">➕ Добавить</button>
            <button type="button" id="cancelBtn" onclick="cancel()" style="display:none;background:transparent;border:1px solid #1e293b;color:#94a3b8;">Отмена</button>
        </form>
    </div>

    <div class="card">
        <h2>📋 Все рейсы</h2>
        <div id="list">Загрузка...</div>
    </div>

    <script>
        const API = '/api/flights';

        async function load() {
            try {
                const r = await fetch(API);
                const d = await r.json();
                render(d.flights || []);
            } catch(e) {
                document.getElementById('list').innerHTML = 'Ошибка загрузки';
            }
        }

        async function save(e) {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const flight = {
                airline: document.getElementById('airline').value,
                flightNumber: document.getElementById('flightNumber').value,
                destination: document.getElementById('destination').value,
                iata: document.getElementById('iata').value.toUpperCase(),
                checkInStart: document.getElementById('checkInStart').value,
                checkInEnd: document.getElementById('checkInEnd').value,
                boardingStart: document.getElementById('boardingStart').value,
                boardingEnd: document.getElementById('boardingEnd').value,
                departureTime: document.getElementById('departureTime').value,
                date: document.getElementById('date').value,
                checkInDesks: document.getElementById('checkInDesks').value,
                gate: document.getElementById('gate').value,
            };

            if (id) flight.id = id;

            try {
                const r = await fetch(API + (id ? `?id=${id}` : ''), {
                    method: id ? 'PUT' : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(flight)
                });
                const d = await r.json();
                if (d.success) {
                    showMsg('✅ Сохранено!');
                    cancel();
                    load();
                } else {
                    showMsg('❌ ' + (d.error || 'Ошибка'), 'error');
                }
            } catch(err) {
                showMsg('❌ Ошибка', 'error');
            }
        }

        async function del(id) {
            if (!confirm('Удалить?')) return;
            await fetch(API + '?id=' + id, { method: 'DELETE' });
            showMsg('🗑 Удалено');
            load();
        }

        function edit(flight) {
            document.getElementById('airline').value = flight.airline || '';
            document.getElementById('flightNumber').value = flight.flightNumber || '';
            document.getElementById('destination').value = flight.destination || '';
            document.getElementById('iata').value = flight.iata || '';
            document.getElementById('checkInStart').value = flight.checkInStart || '';
            document.getElementById('checkInEnd').value = flight.checkInEnd || '';
            document.getElementById('boardingStart').value = flight.boardingStart || '';
            document.getElementById('boardingEnd').value = flight.boardingEnd || '';
            document.getElementById('departureTime').value = flight.departureTime || '';
            document.getElementById('date').value = flight.date || '';
            document.getElementById('checkInDesks').value = flight.checkInDesks || '';
            document.getElementById('gate').value = flight.gate || '';
            document.getElementById('editId').value = flight.id || '';
            document.getElementById('formTitle').textContent = '✏️ Редактировать';
            document.getElementById('submitBtn').textContent = '💾 Сохранить';
            document.getElementById('cancelBtn').style.display = 'inline-block';
        }

        function cancel() {
            document.querySelector('form').reset();
            document.getElementById('editId').value = '';
            document.getElementById('formTitle').textContent = '➕ Добавить рейс';
            document.getElementById('submitBtn').textContent = '➕ Добавить';
            document.getElementById('cancelBtn').style.display = 'none';
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
        }

        function render(flights) {
            if (!flights.length) {
                document.getElementById('list').innerHTML = '<p style="color:#94a3b8;">Нет рейсов</p>';
                return;
            }
            document.getElementById('list').innerHTML = flights
                .sort((a, b) => (a.date + a.departureTime).localeCompare(b.date + b.departureTime))
                .map(f => `
                    <div class="item">
                        <span>📅 ${f.date} 🕐 ${f.departureTime} ✈ <strong>${f.airline} ${f.flightNumber}</strong> 📍 ${f.destination} (${f.iata})</span>
                        <span>
                            <button onclick="edit(${JSON.stringify(f).replace(/"/g, '&quot;')})" style="background:transparent;border:1px solid #3b82f6;color:#3b82f6;padding:6px 12px;border-radius:6px;cursor:pointer;margin-right:6px;">✏️</button>
                            <button class="btn-del" onclick="del('${f.id}')">🗑</button>
                        </span>
                    </div>
                `).join('');
        }

        function showMsg(msg, type = 'success') {
            const d = document.createElement('div');
            d.className = 'msg';
            d.style.background = type === 'error' ? '#ef4444' : '#10b981';
            d.textContent = msg;
            document.body.appendChild(d);
            setTimeout(() => d.remove(), 3000);
        }

        document.getElementById('date').value = new Date().toISOString().split('T')[0];
        load();
        setInterval(load, 10000);
    </script>
</body>
</html>
