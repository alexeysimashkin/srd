<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аэропорт Свердловский - Онлайн табло</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #e0f0ff; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #0277bd, #01579b); border-radius: 20px; padding: 25px 35px; margin-bottom: 30px; border-left: 5px solid #ffd700; }
        .header h1 { color: white; font-size: 32px; }
        .header p { color: #ffd700; margin-top: 8px; }
        .time { text-align: right; background: white; padding: 15px 20px; border-radius: 12px; margin-bottom: 25px; font-weight: bold; color: #0277bd; font-size: 18px; font-family: monospace; }
        .tabs { display: flex; gap: 15px; margin-bottom: 25px; }
        .tab { background: rgba(2,119,189,0.2); border: none; padding: 12px 30px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; color: #01579b; transition: 0.3s; }
        .tab.active, .tab:hover { background: #0277bd; color: white; }
        .panel { display: none; background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .panel.active { display: block; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #0277bd; color: white; }
        .status { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; }
        .status-reg { background: #2196f3; color: white; }
        .status-board { background: #ff9800; color: white; }
        .status-dep { background: #4caf50; color: white; }
        .status-wait { background: #9e9e9e; color: white; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #01579b; }
        .btn { background: #0277bd; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        .btn:hover { background: #01579b; }
        .edit-btn, .delete-btn { padding: 5px 10px; margin: 0 5px; border: none; border-radius: 5px; cursor: pointer; }
        .edit-btn { background: #2196f3; color: white; }
        .delete-btn { background: #dc3545; color: white; }
        h3 { margin: 20px 0 15px 0; color: #01579b; }
        .edit-panel { background: #f0f8ff; border: 2px solid #0277bd; border-radius: 15px; padding: 20px; margin-top: 20px; }
        .hidden { display: none; }
        .sync-note { margin-top: 15px; padding: 10px; background: #e8f5e9; border-radius: 10px; text-align: center; font-size: 13px; color: #2e7d32; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>✈️ Аэропорт Свердловский (Екатеринбург)</h1>
        <p>Код IATA: SRD • GMT+5</p>
    </div>

    <div class="time" id="currentTime"></div>

    <div class="tabs">
        <button class="tab active" onclick="showPanel('tablo')">📋 Табло рейсов</button>
        <button class="tab" onclick="showPanel('admin')">⚙️ Админ-панель</button>
    </div>

    <!-- ТАБЛО -->
    <div id="tabloPanel" class="panel active">
        <div style="overflow-x: auto;">
            <table>
                <thead><tr><th>Время вылета</th><th>Рейс</th><th>Направление</th><th>Код IATA</th><th>Ожидание</th><th>Статус</th></tr></thead>
                <tbody id="flightsList"></tbody>
            </table>
        </div>
    </div>

    <!-- АДМИНКА -->
    <div id="adminPanel" class="panel">
        <div id="adminArea"></div>
    </div>
</div>

<script>
    // ========== ДАННЫЕ ХРАНЯТСЯ В ОБЛАКЕ (Google Sheets) ==========
    // ВСТАВЬ СВОЮ ССЫЛКУ ИЗ GOOGLE SHEETS (Файл → Опубликовать → CSV)
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSCIkYTRlEHADtBUxHsndZRerY9Rk-P-Iz46x1jyVMAlCwkTMzXG4-OAeAyyVWsOgidOJ_TW_LZS4B4/pub?output=csv";
    // ===============================================================
    
    let flights = [];
    let editId = null;
    
    // ВРЕМЯ GMT+5 (Екатеринбург)
    function getEkaterinburgTime() {
        const now = new Date();
        return new Date(now.getTime() + (5 * 60 * 60 * 1000));
    }
    
    // ЗАГРУЗКА ИЗ GOOGLE SHEETS
    async function loadFlights() {
        try {
            const res = await fetch(CSV_URL + '?t=' + Date.now());
            const text = await res.text();
            const rows = text.split('\n');
            flights = [];
            for(let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(',');
                if(cols.length >= 5 && cols[0] && cols[0] !== 'id') {
                    flights.push({
                        id: parseInt(cols[0]) || i,
                        flightNumber: cols[1]?.trim(),
                        destination: cols[2]?.trim(),
                        iataCode: cols[3]?.trim(),
                        departureTime: cols[4]?.trim(),
                        expectedTime: cols[5]?.trim() || '',
                        regStart: cols[6]?.trim() || '',
                        regEnd: cols[7]?.trim() || '',
                        boardingStart: cols[8]?.trim() || '',
                        boardingEnd: cols[9]?.trim() || ''
                    });
                }
            }
            renderTablo();
            renderAdmin();
        } catch(e) {
            document.getElementById('flightsList').innerHTML = `<tr><td colspan="6">Ошибка загрузки: ${e.message}</td></tr>`;
        }
    }
    
    // ОПРЕДЕЛЕНИЕ СТАТУСА
    function getStatus(flight) {
        const now = getEkaterinburgTime();
        const dep = new Date(flight.departureTime);
        const regStart = flight.regStart ? new Date(flight.regStart) : null;
        const regEnd = flight.regEnd ? new Date(flight.regEnd) : null;
        const boardStart = flight.boardingStart ? new Date(flight.boardingStart) : null;
        const boardEnd = flight.boardingEnd ? new Date(flight.boardingEnd) : null;
        
        if(now > dep) return { text: '✈️ ВЫЛЕТЕЛ', class: 'status-dep' };
        if(boardEnd && now > boardEnd) return { text: '🔒 ПОСАДКА ЗАКРЫТА', class: 'status-wait' };
        if(boardStart && now >= boardStart) return { text: '🎫 ПОСАДКА', class: 'status-board' };
        if(regEnd && now > regEnd) return { text: '⏰ РЕГИСТРАЦИЯ ЗАКРЫТА', class: 'status-wait' };
        if(regStart && now >= regStart) return { text: '✅ РЕГИСТРАЦИЯ', class: 'status-reg' };
        return { text: '⏳ ОЖИДАЕТСЯ', class: 'status-wait' };
    }
    
    // ОТРИСОВКА ТАБЛО
    function renderTablo() {
        const tbody = document.getElementById('flightsList');
        const sorted = [...flights].sort((a,b) => new Date(a.departureTime) - new Date(b.departureTime));
        if(!sorted.length) {
            tbody.innerHTML = '<tr><td colspan="6">Нет рейсов</td></tr>';
            return;
        }
        tbody.innerHTML = sorted.map(f => {
            const status = getStatus(f);
            const dep = new Date(f.departureTime);
            const exp = f.expectedTime ? new Date(f.expectedTime) : null;
            return `<tr>
                <td>${dep.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})}</td>
                <td><strong>${f.flightNumber}</strong></td>
                <td>${f.destination}</td>
                <td>${f.iataCode}</td>
                <td>${exp ? exp.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'}) : '—'}</td>
                <td><span class="status ${status.class}">${status.text}</span></td>
            </tr>`;
        }).join('');
    }
    
    // ОТРИСОВКА АДМИНКИ
    function renderAdmin() {
        const area = document.getElementById('adminArea');
        area.innerHTML = `
            <h3>➕ Добавить рейс</h3>
            <form id="addForm">
                <div class="form-row">
                    <div class="form-group"><label>Номер рейса</label><input type="text" id="flightNumber" required placeholder="AS-477"></div>
                    <div class="form-group"><label>Направление</label><input type="text" id="destination" required placeholder="Самара"></div>
                    <div class="form-group"><label>Код IATA</label><input type="text" id="iataCode" required placeholder="KUF"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Время вылета</label><input type="datetime-local" id="departureTime" required></div>
                    <div class="form-group"><label>Ожидаемое время</label><input type="datetime-local" id="expectedTime"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Начало регистрации</label><input type="datetime-local" id="regStart"></div>
                    <div class="form-group"><label>Конец регистрации</label><input type="datetime-local" id="regEnd"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Начало посадки</label><input type="datetime-local" id="boardingStart"></div>
                    <div class="form-group"><label>Конец посадки</label><input type="datetime-local" id="boardingEnd"></div>
                </div>
                <button type="submit" class="btn">✈️ Добавить рейс</button>
            </form>
            
            <h3>📋 Все рейсы</h3>
            <div style="overflow-x:auto;">
                <table>
                    <thead><tr><th>Рейс</th><th>Направление</th><th>Время вылета</th><th>Статус</th><th>Действия</th></tr></thead>
                    <tbody id="adminList"></tbody>
                </table>
            </div>
            
            <div id="editBlock" class="edit-panel hidden">
                <h3>✏️ Редактировать рейс</h3>
                <div class="form-row">
                    <div><label>Номер</label><input type="text" id="edit_flightNumber"></div>
                    <div><label>Направление</label><input type="text" id="edit_destination"></div>
                    <div><label>Код</label><input type="text" id="edit_iataCode"></div>
                </div>
                <div class="form-row">
                    <div><label>Время вылета</label><input type="datetime-local" id="edit_departureTime"></div>
                    <div><label>Ожидаемое</label><input type="datetime-local" id="edit_expectedTime"></div>
                </div>
                <div class="form-row">
                    <div><label>Начало регистрации</label><input type="datetime-local" id="edit_regStart"></div>
                    <div><label>Конец регистрации</label><input type="datetime-local" id="edit_regEnd"></div>
                    <div><label>Начало посадки</label><input type="datetime-local" id="edit_boardingStart"></div>
                    <div><label>Конец посадки</label><input type="datetime-local" id="edit_boardingEnd"></div>
                </div>
                <button onclick="saveEdit()" class="btn">💾 Сохранить</button>
                <button onclick="cancelEdit()" class="btn" style="background:#666">❌ Отмена</button>
            </div>
        `;
        
        // ЗАПОЛНЯЕМ ТАБЛИЦУ РЕЙСОВ В АДМИНКЕ
        const adminBody = document.getElementById('adminList');
        if(flights.length === 0) {
            adminBody.innerHTML = '<tr><td colspan="5">Нет рейсов</td></tr>';
        } else {
            adminBody.innerHTML = flights.map(f => {
                const status = getStatus(f);
                const dep = new Date(f.departureTime);
                return `<tr>
                    <td>${f.flightNumber}</td>
                    <td>${f.destination} (${f.iataCode})</td>
                    <td>${dep.toLocaleString()}</td>
                    <td><span class="status ${status.class}">${status.text}</span></td>
                    <td>
                        <button class="edit-btn" onclick="openEdit(${f.id})">✏️ Ред.</button>
                        <button class="delete-btn" onclick="deleteFlight(${f.id})">🗑️ Удалить</button>
                    </td>
                </tr>`;
            }).join('');
        }
        
        // ПРИВЯЗЫВАЕМ ФОРМУ
        document.getElementById('addForm')?.addEventListener('submit', addFlight);
    }
    
    // ДОБАВЛЕНИЕ (сохраняется в localStorage, но в реальности надо в Google Sheets)
    // ВАЖНО: изменения сохраняются ТОЛЬКО в браузере, пока нет записи в Google Sheets
    function addFlight(e) {
        e.preventDefault();
        const newFlight = {
            id: Date.now(),
            flightNumber: document.getElementById('flightNumber').value,
            destination: document.getElementById('destination').value,
            iataCode: document.getElementById('iataCode').value,
            departureTime: document.getElementById('departureTime').value,
            expectedTime: document.getElementById('expectedTime').value || '',
            regStart: document.getElementById('regStart').value || '',
            regEnd: document.getElementById('regEnd').value || '',
            boardingStart: document.getElementById('boardingStart').value || '',
            boardingEnd: document.getElementById('boardingEnd').value || ''
        };
        flights.push(newFlight);
        // Сохраняем в localStorage как временное решение
        localStorage.setItem('flights_backup', JSON.stringify(flights));
        renderTablo();
        renderAdmin();
        e.target.reset();
        alert('✅ Рейс добавлен (сохранено в браузере). Чтобы сохранить навсегда — скопируй данные в Google Sheets.');
    }
    
    function openEdit(id) {
        const f = flights.find(f => f.id === id);
        if(!f) return;
        editId = id;
        document.getElementById('edit_flightNumber').value = f.flightNumber;
        document.getElementById('edit_destination').value = f.destination;
        document.getElementById('edit_iataCode').value = f.iataCode;
        document.getElementById('edit_departureTime').value = f.departureTime.slice(0,16);
        document.getElementById('edit_expectedTime').value = f.expectedTime?.slice(0,16) || '';
        document.getElementById('edit_regStart').value = f.regStart?.slice(0,16) || '';
        document.getElementById('edit_regEnd').value = f.regEnd?.slice(0,16) || '';
        document.getElementById('edit_boardingStart').value = f.boardingStart?.slice(0,16) || '';
        document.getElementById('edit_boardingEnd').value = f.boardingEnd?.slice(0,16) || '';
        document.getElementById('editBlock').classList.remove('hidden');
    }
    
    function saveEdit() {
        const index = flights.findIndex(f => f.id === editId);
        if(index !== -1) {
            flights[index] = {
                ...flights[index],
                flightNumber: document.getElementById('edit_flightNumber').value,
                destination: document.getElementById('edit_destination').value,
                iataCode: document.getElementById('edit_iataCode').value,
                departureTime: document.getElementById('edit_departureTime').value,
                expectedTime: document.getElementById('edit_expectedTime').value || '',
                regStart: document.getElementById('edit_regStart').value || '',
                regEnd: document.getElementById('edit_regEnd').value || '',
                boardingStart: document.getElementById('edit_boardingStart').value || '',
                boardingEnd: document.getElementById('edit_boardingEnd').value || ''
            };
            localStorage.setItem('flights_backup', JSON.stringify(flights));
            renderTablo();
            renderAdmin();
            cancelEdit();
            alert('✅ Сохранено!');
        }
    }
    
    function cancelEdit() {
        document.getElementById('editBlock').classList.add('hidden');
        editId = null;
    }
    
    function deleteFlight(id) {
        if(!confirm('Удалить рейс?')) return;
        flights = flights.filter(f => f.id !== id);
        localStorage.setItem('flights_backup', JSON.stringify(flights));
        renderTablo();
        renderAdmin();
    }
    
    function showPanel(panel) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if(panel === 'tablo') {
            document.getElementById('tabloPanel').classList.add('active');
            document.querySelector('.tab').classList.add('active');
        } else {
            document.getElementById('adminPanel').classList.add('active');
            document.querySelectorAll('.tab')[1].classList.add('active');
            renderAdmin();
        }
    }
    
    function updateTime() {
        const now = getEkaterinburgTime();
        document.getElementById('currentTime').innerHTML = `🕐 ${now.toLocaleString('ru-RU')} (GMT+5)`;
        renderTablo();
        if(document.getElementById('adminList')) renderAdmin();
    }
    
    // Загружаем резервную копию, если есть
    const backup = localStorage.getItem('flights_backup');
    if(backup) {
        try {
            flights = JSON.parse(backup);
        } catch(e) {}
    }
    
    setInterval(updateTime, 1000);
    loadFlights();
    updateTime();
</script>
</body>
</html>
