<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Онлайн-табло ✈ Аэропорт Кольцово (SVX) | Екатеринбург</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0e17; color: #e2e8f0; min-height: 100vh;
        }
        .header {
            background: #111827; padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #1e293b;
        }
        .code { font-size: 2.5rem; font-weight: 800; color: #f0c040; }
        .name { font-size: 1.4rem; font-weight: 600; }
        .city { font-size: 0.9rem; color: #94a3b8; }
        .clock { font-size: 1.8rem; font-weight: 700; color: #f0c040; }
        .container { max-width: 1400px; margin: 30px auto; padding: 0 20px; }
        .title { font-size: 1.5rem; margin-bottom: 20px; }
        
        table {
            width: 100%; background: #111827; border-radius: 12px;
            border: 1px solid #1e293b; border-collapse: collapse;
        }
        th {
            background: rgba(30,41,59,0.8); padding: 16px; text-align: left;
            color: #94a3b8; font-size: 0.85rem; text-transform: uppercase;
        }
        td { padding: 18px 16px; border-bottom: 1px solid #1e293b; }
        tr:hover { background: rgba(59,130,246,0.05); }
        
        .badge {
            display: inline-block; padding: 6px 14px; border-radius: 20px;
            font-size: 0.85rem; font-weight: 600;
        }
        .check-in { background: rgba(59,130,246,0.2); color: #60a5fa; animation: pulse 2s infinite; }
        .boarding { background: rgba(245,158,11,0.2); color: #fbbf24; animation: pulse 1s infinite; }
        .departed { background: rgba(16,185,129,0.15); color: #34d399; }
        .scheduled { background: rgba(148,163,184,0.15); color: #94a3b8; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .admin-link {
            position: fixed; bottom: 20px; right: 20px;
            background: #111827; color: #f0c040; padding: 10px 20px;
            border-radius: 20px; text-decoration: none; border: 1px solid #f0c040;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <span class="code">SVX</span>
            <div class="name">Международный аэропорт</div>
            <div class="city">Екатеринбург • Кольцово</div>
        </div>
        <div class="clock" id="clock">--:--</div>
    </div>

    <div class="container">
        <div class="title">Вылет • Departures</div>
        <table>
            <thead>
                <tr><th>Время</th><th>Рейс</th><th>Направление</th><th>Статус</th></tr>
            </thead>
            <tbody id="board"></tbody>
        </table>
    </div>

    <a href="/admin.html" class="admin-link">🔧 Управление</a>

    <script>
        const API = '/api/flights';
        let flights = [];

        async function load() {
            try {
                const r = await fetch(API);
                const d = await r.json();
                flights = d.flights || [];
                updateStatuses();
                render();
            } catch(e) {
                document.getElementById('board').innerHTML = 
                    '<tr><td colspan="4" style="text-align:center;padding:40px;">Ошибка загрузки</td></tr>';
            }
        }

        function updateStatuses() {
            const now = new Date();
            const time = now.getHours() * 60 + now.getMinutes();
            const today = now.toISOString().split('T')[0];

            flights.forEach(f => {
                if (!f.date) { f.status = 'scheduled'; f.text = 'По расписанию'; return; }
                if (f.date !== today) {
                    f.status = f.date < today ? 'departed' : 'scheduled';
                    f.text = f.date < today ? 'Вылетел' : 'По расписанию';
                    return;
                }

                const cis = toMin(f.checkInStart);
                const cie = toMin(f.checkInEnd);
                const bs = toMin(f.boardingStart);
                const be = toMin(f.boardingEnd);
                const dep = toMin(f.departureTime);

                if (time < cis) { f.status = 'scheduled'; f.text = 'По расписанию'; }
                else if (time < cie) { f.status = 'check-in'; f.text = 'Регистрация'; }
                else if (time < bs) { f.status = 'check-in-closed'; f.text = 'Регистрация окончена'; }
                else if (time < be) { f.status = 'boarding'; f.text = 'Посадка'; }
                else if (time < dep) { f.status = 'boarding-closed'; f.text = 'Посадка окончена'; }
                else { f.status = 'departed'; f.text = 'Вылетел'; }
            });
        }

        function toMin(t) {
            if (!t) return 0;
            const [h, m] = t.split(':').map(Number);
            return h * 60 + m;
        }

        function render() {
            const today = new Date().toISOString().split('T')[0];
            const visible = flights
                .filter(f => f.date >= today)
                .sort((a, b) => (a.date + a.departureTime).localeCompare(b.date + b.departureTime));

            if (!visible.length) {
                document.getElementById('board').innerHTML = 
                    '<tr><td colspan="4" style="text-align:center;padding:40px;color:#94a3b8;">Нет рейсов</td></tr>';
                return;
            }

            document.getElementById('board').innerHTML = visible.map(f => `
                <tr>
                    <td><strong>${f.departureTime || '—'}</strong></td>
                    <td>
                        <span style="color:#3b82f6;">${esc(f.airline)}</span><br>
                        <strong>${esc(f.flightNumber)}</strong>
                    </td>
                    <td>
                        ${esc(f.destination)} 
                        <span style="color:#f0c040;font-weight:700;">${esc(f.iata)}</span>
                    </td>
                    <td>
                        <span class="badge ${f.status}">${f.text}</span>
                        ${f.checkInDesks && f.status === 'check-in' ? `<div style="font-size:0.75rem;color:#64748b;margin-top:4px;">Стойки: ${esc(f.checkInDesks)}</div>` : ''}
                        ${f.gate && f.status === 'boarding' ? `<div style="font-size:0.75rem;color:#64748b;margin-top:4px;">Выход: ${esc(f.gate)}</div>` : ''}
                    </td>
                </tr>
            `).join('');
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        setInterval(() => {
            const n = new Date();
            document.getElementById('clock').textContent = 
                n.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        }, 1000);

        load();
        setInterval(load, 10000);
    </script>
</body>
</html>
