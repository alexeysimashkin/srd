<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Онлайн-табло - Аэропорт Свердловский (SRD)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', Arial, sans-serif;
            background: #0a0e27;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Шапка аэропорта */
        .airport-header {
            background: linear-gradient(135deg, #0d1b3e, #060b1a);
            border-radius: 20px;
            padding: 25px 35px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border-left: 5px solid #ffd700;
        }

        .airport-name {
            font-size: 36px;
            font-weight: bold;
            color: white;
            letter-spacing: 1px;
        }

        .airport-code {
            font-size: 18px;
            color: #ffd700;
            margin-top: 8px;
            font-family: monospace;
        }

        .airport-code span {
            background: rgba(255,215,0,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }

        /* Вкладки */
        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #ffd700;
            color: #0d1b3e;
        }

        .tab-btn:hover {
            background: #ffd700;
            color: #0d1b3e;
        }

        /* Панели */
        .panel {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .panel.active {
            display: block;
        }

        /* Форма */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .btn {
            background: #0d1b3e;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #ffd700;
            color: #0d1b3e;
        }

        .btn-danger {
            background: #dc3545;
        }

        .btn-danger:hover {
            background: #c82333;
            color: white;
        }

        .btn-warning {
            background: #ffc107;
            color: #333;
        }

        .btn-warning:hover {
            background: #e0a800;
        }

        /* Табло */
        .tablo {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #0d1b3e;
            color: white;
            position: sticky;
            top: 0;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }

        .status-registration { background: #2196f3; color: white; }
        .status-boarding { background: #ff9800; color: white; }
        .status-departed { background: #4caf50; color: white; }
        .status-delayed { background: #f44336; color: white; }
        .status-scheduled { background: #9e9e9e; color: white; }
        .status-finished { background: #607d8b; color: white; }

        .edit-btn, .delete-btn {
            padding: 5px 10px;
            margin: 0 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .edit-btn {
            background: #2196f3;
            color: white;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
        }

        .current-time {
            text-align: right;
            padding: 10px 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            color: white;
            font-family: monospace;
            font-size: 18px;
            margin-bottom: 20px;
        }

        h3 {
            margin-bottom: 20px;
            color: #0d1b3e;
        }

        @media (max-width: 768px) {
            th, td {
                padding: 8px;
                font-size: 12px;
            }
            .airport-name {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="airport-header">
            <div class="airport-name">
                ✈️ Аэропорт Свердловский
            </div>
            <div class="airport-code">
                <span>Екатеринбург, Россия | Код IATA: SRD</span>
            </div>
        </div>

        <div class="current-time" id="currentTime"></div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showPanel('tablo')">📋 Табло рейсов</button>
            <button class="tab-btn" onclick="showPanel('admin')">⚙️ Админ-панель</button>
        </div>

        <!-- Табло для пассажиров -->
        <div id="tabloPanel" class="panel active">
            <div class="tablo">
                <table id="flightsTable">
                    <thead>
                        <tr>
                            <th>Время вылета</th>
                            <th>Рейс</th>
                            <th>Направление</th>
                            <th>Код IATA</th>
                            <th>Ожидаемое время</th>
                            <th>Статус</th>
                        </tr>
                    </thead>
                    <tbody id="flightsList"></tbody>
                </table>
            </div>
        </div>

        <!-- Админ-панель -->
        <div id="adminPanel" class="panel">
            <h3>➕ Добавить новый рейс</h3>
            <form id="flightForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Номер рейса *</label>
                        <input type="text" id="flightNumber" required placeholder="Например: AS-477">
                    </div>
                    <div class="form-group">
                        <label>Направление *</label>
                        <input type="text" id="destination" required placeholder="Например: Санкт-Петербург">
                    </div>
                    <div class="form-group">
                        <label>Код IATA *</label>
                        <input type="text" id="iataCode" required placeholder="Например: LED">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Время вылета (план) *</label>
                        <input type="datetime-local" id="departureTime" required>
                    </div>
                    <div class="form-group">
                        <label>Ожидаемое время вылета</label>
                        <input type="datetime-local" id="expectedTime">
                    </div>
                </div>
                
                <h3 style="margin-top: 30px;">🕐 Служебная информация (не видна пассажирам)</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Начало регистрации</label>
                        <input type="datetime-local" id="regStart">
                    </div>
                    <div class="form-group">
                        <label>Конец регистрации</label>
                        <input type="datetime-local" id="regEnd">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Начало посадки</label>
                        <input type="datetime-local" id="boardingStart">
                    </div>
                    <div class="form-group">
                        <label>Конец посадки</label>
                        <input type="datetime-local" id="boardingEnd">
                    </div>
                </div>
                
                <button type="submit" class="btn">✈️ Добавить рейс</button>
            </form>

            <h3 style="margin-top: 40px;">📋 Управление рейсами</h3>
            <div class="tablo">
                <table>
                    <thead>
                        <tr>
                            <th>Рейс</th>
                            <th>Направление</th>
                            <th>Время вылета</th>
                            <th>Статус</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="adminFlightsList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Хранилище рейсов
        let flights = [];

        // Загрузка из localStorage
        function loadData() {
            const saved = localStorage.getItem('svrFlights');
            if (saved) {
                flights = JSON.parse(saved);
            } else {
                // Пример рейса для демонстрации
                const now = new Date();
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                flights = [
                    {
                        id: Date.now(),
                        flightNumber: 'AS-477',
                        destination: 'Самара',
                        iataCode: 'KUF',
                        departureTime: new Date(today.getTime() + 9*3600000 + 30*60000).toISOString(),
                        expectedTime: '',
                        regStart: new Date(today.getTime() + 6*3600000 + 30*60000).toISOString(),
                        regEnd: new Date(today.getTime() + 8*3600000 + 50*60000).toISOString(),
                        boardingStart: new Date(today.getTime() + 8*3600000 + 55*60000).toISOString(),
                        boardingEnd: new Date(today.getTime() + 9*3600000 + 10*60000).toISOString(),
                        status: ''
                    }
                ];
            }
            renderAll();
        }

        // Сохранение в localStorage
        function saveData() {
            localStorage.setItem('svrFlights', JSON.stringify(flights));
        }

        // Определение статуса по времени
        function getFlightStatus(flight) {
            const now = new Date();
            const depTime = new Date(flight.departureTime);
            const regStart = flight.regStart ? new Date(flight.regStart) : null;
            const regEnd = flight.regEnd ? new Date(flight.regEnd) : null;
            const boardStart = flight.boardingStart ? new Date(flight.boardingStart) : null;
            const boardEnd = flight.boardingEnd ? new Date(flight.boardingEnd) : null;

            if (now > depTime) return { text: '✈️ ВЫЛЕТЕЛ', class: 'status-departed' };
            if (boardEnd && now > boardEnd) return { text: '🔒 ПОСАДКА ЗАКОНЧЕНА', class: 'status-finished' };
            if (boardStart && now >= boardStart && (!boardEnd || now <= boardEnd)) return { text: '🎫 ПОСАДКА', class: 'status-boarding' };
            if (regEnd && now > regEnd) return { text: '⏰ РЕГИСТРАЦИЯ ЗАКОНЧЕНА', class: 'status-finished' };
            if (regStart && now >= regStart && (!regEnd || now <= regEnd)) return { text: '✅ РЕГИСТРАЦИЯ', class: 'status-registration' };
            
            return { text: '⏳ ОЖИДАЕТСЯ', class: 'status-scheduled' };
        }

        // Отображение табло
        function renderFlightsTable() {
            const tbody = document.getElementById('flightsList');
            const now = new Date();
            const sorted = [...flights].sort((a,b) => new Date(a.departureTime) - new Date(b.departureTime));
            
            tbody.innerHTML = sorted.map(flight => {
                const status = getFlightStatus(flight);
                const depTime = new Date(flight.departureTime);
                const expected = flight.expectedTime ? new Date(flight.expectedTime) : null;
                
                return `
                    <tr>
                        <td>${depTime.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})}</td>
                        <td><strong>${flight.flightNumber}</strong></td>
                        <td>${flight.destination}</td>
                        <td>${flight.iataCode}</td>
                        <td>${expected ? expected.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'}) : '—'}</td>
                        <td><span class="status ${status.class}">${status.text}</span></td>
                    </tr>
                `;
            }).join('');
        }

        // Отображение админ-панели
        function renderAdminTable() {
            const tbody = document.getElementById('adminFlightsList');
            tbody.innerHTML = flights.map(flight => {
                const status = getFlightStatus(flight);
                const depTime = new Date(flight.departureTime);
                
                return `
                    <tr>
                        <td>${flight.flightNumber}</td>
                        <td>${flight.destination} (${flight.iataCode})</td>
                        <td>${depTime.toLocaleString()}</td>
                        <td><span class="status ${status.class}">${status.text}</span></td>
                        <td>
                            <button class="edit-btn" onclick="editFlight('${flight.id}')">✏️ Ред.</button>
                            <button class="delete-btn" onclick="deleteFlight('${flight.id}')">🗑️ Удалить</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function renderAll() {
            renderFlightsTable();
            renderAdminTable();
        }

        // Добавление рейса
        document.getElementById('flightForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const newFlight = {
                id: Date.now(),
                flightNumber: document.getElementById('flightNumber').value,
                destination: document.getElementById('destination').value,
                iataCode: document.getElementById('iataCode').value,
                departureTime: document.getElementById('departureTime').value,
                expectedTime: document.getElementById('expectedTime').value || '',
                regStart: document.getElementById('regStart').value || '',
                regEnd: document.getElementById('regEnd').value || '',
                boardingStart: document.getElementById('boardingStart').value || '',
                boardingEnd: document.getElementById('boardingEnd').value || '',
                status: ''
            };
            
            flights.push(newFlight);
            saveData();
            renderAll();
            e.target.reset();
            alert('Рейс добавлен!');
        });

        // Редактирование
        function editFlight(id) {
            const flight = flights.find(f => f.id == id);
            if (!flight) return;
            
            document.getElementById('flightNumber').value = flight.flightNumber;
            document.getElementById('destination').value = flight.destination;
            document.getElementById('iataCode').value = flight.iataCode;
            document.getElementById('departureTime').value = flight.departureTime.slice(0,16);
            document.getElementById('expectedTime').value = flight.expectedTime ? flight.expectedTime.slice(0,16) : '';
            document.getElementById('regStart').value = flight.regStart ? flight.regStart.slice(0,16) : '';
            document.getElementById('regEnd').value = flight.regEnd ? flight.regEnd.slice(0,16) : '';
            document.getElementById('boardingStart').value = flight.boardingStart ? flight.boardingStart.slice(0,16) : '';
            document.getElementById('boardingEnd').value = flight.boardingEnd ? flight.boardingEnd.slice(0,16) : '';
            
            deleteFlight(id);
            showPanel('admin');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // Удаление
        function deleteFlight(id) {
            if (confirm('Удалить рейс?')) {
                flights = flights.filter(f => f.id != id);
                saveData();
                renderAll();
            }
        }

        // Переключение вкладок
        function showPanel(panel) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            if (panel === 'tablo') {
                document.getElementById('tabloPanel').classList.add('active');
                document.querySelector('.tab-btn').classList.add('active');
            } else {
                document.getElementById('adminPanel').classList.add('active');
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
            }
            renderAll();
        }

        // Обновление времени и статусов каждую секунду
        function updateCurrentTime() {
            const now = new Date();
            document.getElementById('currentTime').innerHTML = `🕐 Текущее время: ${now.toLocaleString('ru-RU')}`;
            renderFlightsTable();
            renderAdminTable();
        }

        // Инициализация
        loadData();
        updateCurrentTime();
        setInterval(updateCurrentTime, 1000);
    </script>
</body>
</html>
