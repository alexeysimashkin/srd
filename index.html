<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Аэропорт Свердловский - Онлайн табло</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #e0f0ff; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #0277bd, #01579b); border-radius: 15px; padding: 20px 30px; margin-bottom: 25px; border-left: 5px solid #ffd700; }
        .header h1 { color: white; font-size: 28px; }
        .header p { color: #ffd700; margin-top: 8px; }
        .time { text-align: right; background: white; padding: 12px 20px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; color: #0277bd; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { background: #ccc; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .tab.active { background: #0277bd; color: white; }
        .panel { display: none; background: white; border-radius: 15px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .panel.active { display: block; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #0277bd; color: white; }
        .status { padding: 4px 12px; border-radius: 15px; font-size: 12px; font-weight: bold; display: inline-block; }
        .status-reg { background: #2196f3; color: white; }
        .status-board { background: #ff9800; color: white; }
        .status-dep { background: #4caf50; color: white; }
        .status-wait { background: #9e9e9e; color: white; }
        input, select { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #ddd; border-radius: 5px; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        button { background: #0277bd; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #01579b; }
        .edit-btn { background: #ff9800; padding: 5px 10px; font-size: 12px; margin-right: 5px; }
        .delete-btn { background: #f44336; padding: 5px 10px; font-size: 12px; }
        .edit-panel { background: #f0f8ff; border: 2px solid #0277bd; border-radius: 10px; padding: 20px; margin-top: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>✈️ Аэропорт Свердловский (Екатеринбург)</h1>
        <p>Код IATA: SRD | GMT+5</p>
    </div>
    <div class="time" id="currentTime"></div>
    
    <div class="tabs">
        <button class="tab active" onclick="showPanel('tablo')">📋 Табло рейсов</button>
        <button class="tab" onclick="showPanel('admin')">⚙️ Админ-панель</button>
    </div>
    
    <div id="tabloPanel" class="panel active">
        <table id="tabloTable">
            <thead><tr><th>Время</th><th>Рейс</th><th>Направление</th><th>Код</th><th>Ожидание</th><th>Статус</th></tr></thead>
            <tbody id="flightsList"><tr><td colspan="6" style="text-align:center">Загрузка...</td></tr></tbody>
        </table>
    </div>
    
    <div id="adminPanel" class="panel">
        <h3>➕ Добавить рейс</h3>
        <form id="addForm">
            <div class="form-row">
                <div><label>Номер рейса</label><input type="text" id="flightNumber" required></div>
                <div><label>Направление</label><input type="text" id="destination" required></div>
                <div><label>Код IATA</label><input type="text" id="iataCode" required></div>
            </div>
            <div class="form-row">
                <div><label>Время вылета</label><input type="datetime-local" id="departureTime" required></div>
                <div><label>Ожидаемое время</label><input type="datetime-local" id="expectedTime"></div>
            </div>
            <div class="form-row">
                <div><label>Начало регистрации</label><input type="datetime-local" id="regStart"></div>
                <div><label>Конец регистрации</label><input type="datetime-local" id="regEnd"></div>
                <div><label>Начало посадки</label><input type="datetime-local" id="boardingStart"></div>
                <div><label>Конец посадки</label><input type="datetime-local" id="boardingEnd"></div>
            </div>
            <button type="submit">✈️ Добавить</button>
        </form>
        
        <h3 style="margin-top:30px">📋 Все рейсы</h3>
        <table>
            <thead><tr><th>Рейс</th><th>Направление</th><th>Время</th><th>Статус</th><th>Действия</th></tr></thead>
            <tbody id="adminList"><tr><td colspan="5" style="text-align:center">Загрузка...</td></tr></tbody>
        </table>
        
        <div id="editPanel" class="edit-panel hidden">
            <h3>✏️ Редактировать рейс</h3>
            <div class="form-row">
                <div><label>Номер рейса</label><input type="text" id="edit_flightNumber"></div>
                <div><label>Направление</label><input type="text" id="edit_destination"></div>
                <div><label>Код IATA</label><input type="text" id="edit_iataCode"></div>
            </div>
            <div class="form-row">
                <div><label>Время вылета</label><input type="datetime-local" id="edit_departureTime"></div>
                <div><label>Ожидаемое время</label><input type="datetime-local" id="edit_expectedTime"></div>
            </div>
            <div class="form-row">
                <div><label>Начало регистрации</label><input type="datetime-local" id="edit_regStart"></div>
                <div><label>Конец регистрации</label><input type="datetime-local" id="edit_regEnd"></div>
                <div><label>Начало посадки</label><input type="datetime-local" id="edit_boardingStart"></div>
                <div><label>Конец посадки</label><input type="datetime-local" id="edit_boardingEnd"></div>
            </div>
            <button onclick="saveEdit()">💾 Сохранить</button>
            <button onclick="cancelEdit()">❌ Отмена</button>
        </div>
    </div>
</div>

<script>
    // ========== ВСТАВЬ СВОИ ССЫЛКИ СЮДА ==========
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRTcxR0rJrEF29XEA-7lc52-sq7d9bTt2pmy7fCkh-m8oHe9KOklSl0560vYSsrsNWOFt7NDgdNo78a/pub?output=csv";
    const API_URL = "https://script.google.com/macros/s/AKfycbz_0qZEoVViGb2DH11ZLvoVv2K08ptNFhS2pCofMlRstJ3Yq8hzpHQpvAeOIAP88arJSg/exec";
    // ============================================
    
    let flights = [];
    let editId = null;
    
    function getGMT5() {
        let now = new Date();
        return new Date(now.getTime() + (5 * 60 - now.getTimezoneOffset()) * 60000);
    }
    
    async function loadFlights() {
        try {
            let res = await fetch(CSV_URL + '?t=' + Date.now());
            let text = await res.text();
            let rows = text.split('\n').slice(1);
            flights = [];
            for(let row of rows) {
                let cols = row.split(',');
                if(cols.length >= 5 && cols[0] && cols[0] !== 'id') {
                    flights.push({
                        id: cols[0],
                        flightNumber: cols[1],
                        destination: cols[2],
                        iataCode: cols[3],
                        departureTime: cols[4],
                        expectedTime: cols[5] || '',
                        regStart: cols[6] || '',
                        regEnd: cols[7] || '',
                        boardingStart: cols[8] || '',
                        boardingEnd: cols[9] || ''
                    });
                }
            }
            renderAll();
        } catch(e) {
            console.error(e);
        }
    }
    
    function getStatus(flight) {
        let now = getGMT5();
        let dep = new Date(flight.departureTime);
        let regStart = flight.regStart ? new Date(flight.regStart) : null;
        let regEnd = flight.regEnd ? new Date(flight.regEnd) : null;
        let boardStart = flight.boardingStart ? new Date(flight.boardingStart) : null;
        let boardEnd = flight.boardingEnd ? new Date(flight.boardingEnd) : null;
        
        if(now > dep) return { text: '✈️ ВЫЛЕТЕЛ', class: 'status-dep' };
        if(boardEnd && now > boardEnd) return { text: '🔒 ПОСАДКА ЗАКРЫТА', class: 'status-wait' };
        if(boardStart && now >= boardStart) return { text: '🎫 ПОСАДКА', class: 'status-board' };
        if(regEnd && now > regEnd) return { text: '⏰ РЕГИСТРАЦИЯ ЗАКРЫТА', class: 'status-wait' };
        if(regStart && now >= regStart) return { text: '✅ РЕГИСТРАЦИЯ', class: 'status-reg' };
        return { text: '⏳ ОЖИДАЕТСЯ', class: 'status-wait' };
    }
    
    function renderAll() {
        let sorted = [...flights].sort((a,b) => new Date(a.departureTime) - new Date(b.departureTime));
        
        // Табло
        let tbody = document.getElementById('flightsList');
        if(sorted.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6">Нет рейсов</td></tr>';
        } else {
            tbody.innerHTML = sorted.map(f => {
                let status = getStatus(f);
                let dep = new Date(f.departureTime);
                let exp = f.expectedTime ? new Date(f.expectedTime) : null;
                return `<tr>
                    <td>${dep.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})}</td>
                    <td><b>${f.flightNumber}</b></td>
                    <td>${f.destination}</td>
                    <td>${f.iataCode}</td>
                    <td>${exp ? exp.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'}) : '—'}</td>
                    <td><span class="status ${status.class}">${status.text}</span></td>
                </tr>`;
            }).join('');
        }
        
        // Админка
        let adminBody = document.getElementById('adminList');
        if(flights.length === 0) {
            adminBody.innerHTML = '<tr><td colspan="5">Нет рейсов</td></tr>';
        } else {
            adminBody.innerHTML = flights.map(f => {
                let status = getStatus(f);
                let dep = new Date(f.departureTime);
                return `<tr>
                    <td>${f.flightNumber}</td>
                    <td>${f.destination} (${f.iataCode})</td>
                    <td>${dep.toLocaleString()}</td>
                    <td><span class="status ${status.class}">${status.text}</span></td>
                    <td>
                        <button class="edit-btn" onclick="openEdit('${f.id}')">Ред.</button>
                        <button class="delete-btn" onclick="deleteFlight('${f.id}')">Удл</button>
                    </td>
                </tr>`;
            }).join('');
        }
    }
    
    document.getElementById('addForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        let flight = {
            flightNumber: document.getElementById('flightNumber').value,
            destination: document.getElementById('destination').value,
            iataCode: document.getElementById('iataCode').value,
            departureTime: document.getElementById('departureTime').value,
            expectedTime: document.getElementById('expectedTime').value || '',
            regStart: document.getElementById('regStart').value || '',
            regEnd: document.getElementById('regEnd').value || '',
            boardingStart: document.getElementById('boardingStart').value || '',
            boardingEnd: document.getElementById('boardingEnd').value || ''
        };
        try {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(flight) });
            alert('Добавлено! Обнови страницу через 5 сек');
            setTimeout(() => loadFlights(), 3000);
            e.target.reset();
        } catch(err) {
            alert('Ошибка: ' + err.message);
        }
    });
    
    async function deleteFlight(id) {
        if(confirm('Удалить рейс?')) {
            await fetch(API_URL + '?id=' + id, { method: 'DELETE', mode: 'no-cors' });
            alert('Удалено! Обнови страницу');
            setTimeout(() => loadFlights(), 2000);
        }
    }
    
    function openEdit(id) {
        let f = flights.find(f => f.id == id);
        if(!f) return;
        editId = id;
        document.getElementById('edit_flightNumber').value = f.flightNumber;
        document.getElementById('edit_destination').value = f.destination;
        document.getElementById('edit_iataCode').value = f.iataCode;
        document.getElementById('edit_departureTime').value = f.departureTime.slice(0,16);
        document.getElementById('edit_expectedTime').value = f.expectedTime ? f.expectedTime.slice(0,16) : '';
        document.getElementById('edit_regStart').value = f.regStart ? f.regStart.slice(0,16) : '';
        document.getElementById('edit_regEnd').value = f.regEnd ? f.regEnd.slice(0,16) : '';
        document.getElementById('edit_boardingStart').value = f.boardingStart ? f.boardingStart.slice(0,16) : '';
        document.getElementById('edit_boardingEnd').value = f.boardingEnd ? f.boardingEnd.slice(0,16) : '';
        document.getElementById('editPanel').classList.remove('hidden');
    }
    
    async function saveEdit() {
        let flight = {
            id: editId,
            flightNumber: document.getElementById('edit_flightNumber').value,
            destination: document.getElementById('edit_destination').value,
            iataCode: document.getElementById('edit_iataCode').value,
            departureTime: document.getElementById('edit_departureTime').value,
            expectedTime: document.getElementById('edit_expectedTime').value || '',
            regStart: document.getElementById('edit_regStart').value || '',
            regEnd: document.getElementById('edit_regEnd').value || '',
            boardingStart: document.getElementById('edit_boardingStart').value || '',
            boardingEnd: document.getElementById('edit_boardingEnd').value || ''
        };
        await fetch(API_URL, { method: 'PUT', mode: 'no-cors', body: JSON.stringify(flight) });
        alert('Сохранено! Обнови страницу');
        cancelEdit();
        setTimeout(() => loadFlights(), 2000);
    }
    
    function cancelEdit() {
        document.getElementById('editPanel').classList.add('hidden');
        editId = null;
    }
    
    function showPanel(panel) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if(panel === 'tablo') {
            document.getElementById('tabloPanel').classList.add('active');
            document.querySelector('.tab').classList.add('active');
        } else {
            document.getElementById('adminPanel').classList.add('active');
            document.querySelectorAll('.tab')[1].classList.add('active');
        }
    }
    
    function updateTime() {
        let now = getGMT5();
        document.getElementById('currentTime').innerHTML = `🕐 GMT+5: ${now.toLocaleString('ru-RU')}`;
        renderAll();
    }
    
    loadFlights();
    updateTime();
    setInterval(updateTime, 1000);
</script>
</body>
</html>
