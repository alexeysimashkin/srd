<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Онлайн-табло - Аэропорт Свердловский (SRD)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', Arial, sans-serif;
            background: #e0f0ff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .airport-header {
            background: linear-gradient(135deg, #0277bd, #01579b);
            border-radius: 20px;
            padding: 25px 35px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-left: 5px solid #ffd700;
        }

        .airport-name {
            font-size: 36px;
            font-weight: bold;
            color: white;
            letter-spacing: 1px;
        }

        .airport-code {
            font-size: 18px;
            color: #ffd700;
            margin-top: 8px;
            font-family: monospace;
        }

        .airport-code span {
            background: rgba(255,215,0,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }

        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(2,119,189,0.2);
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: #01579b;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #0277bd;
            color: white;
        }

        .tab-btn:hover {
            background: #0277bd;
            color: white;
        }

        .panel {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .panel.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .btn {
            background: #0277bd;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #01579b;
        }

        .btn-danger {
            background: #dc3545;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .tablo {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #0277bd;
            color: white;
            position: sticky;
            top: 0;
        }

        tr:hover {
            background: #f0f8ff;
        }

        .status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }

        .status-registration { background: #2196f3; color: white; }
        .status-boarding { background: #ff9800; color: white; }
        .status-departed { background: #4caf50; color: white; }
        .status-scheduled { background: #9e9e9e; color: white; }
        .status-finished { background: #607d8b; color: white; }

        .edit-btn, .delete-btn {
            padding: 5px 10px;
            margin: 0 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .edit-btn {
            background: #2196f3;
            color: white;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
        }

        .current-time {
            text-align: right;
            padding: 10px 20px;
            background: white;
            border-radius: 10px;
            color: #0277bd;
            font-family: monospace;
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        h3 {
            margin-bottom: 20px;
            color: #01579b;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #0277bd;
        }

        @media (max-width: 768px) {
            th, td {
                padding: 8px;
                font-size: 12px;
            }
            .airport-name {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="airport-header">
            <div class="airport-name">
                ✈️ Аэропорт Свердловский
            </div>
            <div class="airport-code">
                <span>Екатеринбург, Россия | Код IATA: SRD | GMT+5</span>
            </div>
        </div>

        <div class="current-time" id="currentTime"></div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showPanel('tablo')">📋 Табло рейсов</button>
            <button class="tab-btn" onclick="showPanel('admin')">⚙️ Админ-панель</button>
        </div>

        <div id="tabloPanel" class="panel active">
            <div class="tablo">
                <table>
                    <thead>
                        <tr><th>Время вылета</th><th>Рейс</th><th>Направление</th><th>Код IATA</th><th>Ожидаемое время</th><th>Статус</th></tr>
                    </thead>
                    <tbody id="flightsList"><tr><td colspan="6" class="loading">Загрузка рейсов...</td></tr></tbody>
                </table>
            </div>
        </div>

        <div id="adminPanel" class="panel">
            <h3>➕ Добавить новый рейс</h3>
            <form id="flightForm">
                <div class="form-row">
                    <div class="form-group"><label>Номер рейса *</label><input type="text" id="flightNumber" required placeholder="Например: AS-477"></div>
                    <div class="form-group"><label>Направление *</label><input type="text" id="destination" required placeholder="Например: Санкт-Петербург"></div>
                    <div class="form-group"><label>Код IATA *</label><input type="text" id="iataCode" required placeholder="Например: LED"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Время вылета (план) *</label><input type="datetime-local" id="departureTime" required></div>
                    <div class="form-group"><label>Ожидаемое время вылета</label><input type="datetime-local" id="expectedTime"></div>
                </div>
                <h3 style="margin-top:30px">🕐 Служебная информация</h3>
                <div class="form-row">
                    <div class="form-group"><label>Начало регистрации</label><input type="datetime-local" id="regStart"></div>
                    <div class="form-group"><label>Конец регистрации</label><input type="datetime-local" id="regEnd"></div>
                    <div class="form-group"><label>Начало посадки</label><input type="datetime-local" id="boardingStart"></div>
                    <div class="form-group"><label>Конец посадки</label><input type="datetime-local" id="boardingEnd"></div>
                </div>
                <button type="submit" class="btn">✈️ Добавить рейс</button>
            </form>
            <h3 style="margin-top:40px">📋 Управление рейсами</h3>
            <div class="tablo">
                <table><thead><tr><th>Рейс</th><th>Направление</th><th>Время вылета</th><th>Статус</th><th>Действия</th></tr></thead>
                <tbody id="adminFlightsList"></tbody></table>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ ВСТАВЬТЕ ВАШ API КЛЮЧ СЮДА ⚠️
        const JSONBIN_API_KEY = "$2a$10$2RBxmgkQhOfpE029Ou70N.ieDYPPoeRW9pr2OUDbL12zZNZEi.vfW";
        const BIN_ID = "69ecd51a10716a4d5de5ecc1";
        
        let flights = [];
        
        // Функция получения времени GMT+5
        function getCurrentTimeGMT5() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            return new Date(utc + (5 * 3600000));
        }
        
        // Загрузка данных с сервера
        async function loadFromServer() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                const data = await response.json();
                flights = data.record.flights || [];
                renderAll();
                return true;
            } catch(e) {
                console.error('Ошибка загрузки:', e);
                document.getElementById('flightsList').innerHTML = '<tr><td colspan="6" class="loading">Ошибка загрузки. Проверьте API ключ.</td></tr>';
                return false;
            }
        }
        
        // Сохранение на сервер
        async function saveToServer() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY
                    },
                    body: JSON.stringify({ flights: flights })
                });
                return response.ok;
            } catch(e) {
                console.error('Ошибка сохранения:', e);
                return false;
            }
        }
        
        // Определение статуса
        function getFlightStatus(flight) {
            const now = getCurrentTimeGMT5();
            const depTime = new Date(flight.departureTime);
            const regStart = flight.regStart ? new Date(flight.regStart) : null;
            const regEnd = flight.regEnd ? new Date(flight.regEnd) : null;
            const boardStart = flight.boardingStart ? new Date(flight.boardingStart) : null;
            const boardEnd = flight.boardingEnd ? new Date(flight.boardingEnd) : null;
            
            if (now > depTime) return { text: '✈️ ВЫЛЕТЕЛ', class: 'status-departed' };
            if (boardEnd && now > boardEnd) return { text: '🔒 ПОСАДКА ЗАКОНЧЕНА', class: 'status-finished' };
            if (boardStart && now >= boardStart && (!boardEnd || now <= boardEnd)) return { text: '🎫 ПОСАДКА', class: 'status-boarding' };
            if (regEnd && now > regEnd) return { text: '⏰ РЕГИСТРАЦИЯ ЗАКОНЧЕНА', class: 'status-finished' };
            if (regStart && now >= regStart && (!regEnd || now <= regEnd)) return { text: '✅ РЕГИСТРАЦИЯ', class: 'status-registration' };
            return { text: '⏳ ОЖИДАЕТСЯ', class: 'status-scheduled' };
        }
        
        function renderFlightsTable() {
            const tbody = document.getElementById('flightsList');
            const sorted = [...flights].sort((a,b) => new Date(a.departureTime) - new Date(b.departureTime));
            tbody.innerHTML = sorted.map(flight => {
                const status = getFlightStatus(flight);
                const depTime = new Date(flight.departureTime);
                const expected = flight.expectedTime ? new Date(flight.expectedTime) : null;
                return `<tr>
                    <td>${depTime.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})}</td>
                    <td><strong>${flight.flightNumber}</strong></td>
                    <td>${flight.destination}</td>
                    <td>${flight.iataCode}</td>
                    <td>${expected ? expected.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'}) : '—'}</td>
                    <td><span class="status ${status.class}">${status.text}</span></td>
                </tr>`;
            }).join('');
        }
        
        function renderAdminTable() {
            const tbody = document.getElementById('adminFlightsList');
            tbody.innerHTML = flights.map(flight => {
                const status = getFlightStatus(flight);
                const depTime = new Date(flight.departureTime);
                return `<tr>
                    <td>${flight.flightNumber}</td>
                    <td>${flight.destination} (${flight.iataCode})</td>
                    <td>${depTime.toLocaleString()}</td>
                    <td><span class="status ${status.class}">${status.text}</span></td>
                    <td><button class="edit-btn" onclick="editFlight('${flight.id}')">✏️ Ред.</button>
                    <button class="delete-btn" onclick="deleteFlight('${flight.id}')">🗑️ Удалить</button></td>
                </tr>`;
            }).join('');
        }
        
        async function renderAll() {
            renderFlightsTable();
            renderAdminTable();
        }
        
        document.getElementById('flightForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newFlight = {
                id: Date.now().toString(),
                flightNumber: document.getElementById('flightNumber').value,
                destination: document.getElementById('destination').value,
                iataCode: document.getElementById('iataCode').value,
                departureTime: document.getElementById('departureTime').value,
                expectedTime: document.getElementById('expectedTime').value || '',
                regStart: document.getElementById('regStart').value || '',
                regEnd: document.getElementById('regEnd').value || '',
                boardingStart: document.getElementById('boardingStart').value || '',
                boardingEnd: document.getElementById('boardingEnd').value || ''
            };
            flights.push(newFlight);
            await saveToServer();
            renderAll();
            e.target.reset();
            alert('✅ Рейс добавлен! Все пользователи увидят обновления.');
        });
        
        async function editFlight(id) {
            const flight = flights.find(f => f.id == id);
            if (!flight) return;
            document.getElementById('flightNumber').value = flight.flightNumber;
            document.getElementById('destination').value = flight.destination;
            document.getElementById('iataCode').value = flight.iataCode;
            document.getElementById('departureTime').value = flight.departureTime.slice(0,16);
            document.getElementById('expectedTime').value = flight.expectedTime ? flight.expectedTime.slice(0,16) : '';
            document.getElementById('regStart').value = flight.regStart ? flight.regStart.slice(0,16) : '';
            document.getElementById('regEnd').value = flight.regEnd ? flight.regEnd.slice(0,16) : '';
            document.getElementById('boardingStart').value = flight.boardingStart ? flight.boardingStart.slice(0,16) : '';
            document.getElementById('boardingEnd').value = flight.boardingEnd ? flight.boardingEnd.slice(0,16) : '';
            await deleteFlight(id);
            showPanel('admin');
            window.scrollTo({top:0, behavior:'smooth'});
        }
        
        async function deleteFlight(id) {
            if (confirm('Удалить рейс?')) {
                flights = flights.filter(f => f.id != id);
                await saveToServer();
                renderAll();
            }
        }
        
        function showPanel(panel) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if (panel === 'tablo') {
                document.getElementById('tabloPanel').classList.add('active');
                document.querySelector('.tab-btn').classList.add('active');
            } else {
                document.getElementById('adminPanel').classList.add('active');
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
            }
        }
        
        function updateCurrentTime() {
            const now = getCurrentTimeGMT5();
            document.getElementById('currentTime').innerHTML = `🕐 Текущее время (GMT+5): ${now.toLocaleString('ru-RU')}`;
            renderFlightsTable();
            renderAdminTable();
        }
        
        // Запуск
        async function init() {
            await loadFromServer();
            updateCurrentTime();
            setInterval(() => {
                updateCurrentTime();
                renderFlightsTable();
            }, 1000);
        }
        
        init();
    </script>
</body>
</html>
