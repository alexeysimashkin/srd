<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Аэропорт Свердловский</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #e0f0ff; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; }
        .header { background: #0277bd; color: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        .time { background: white; padding: 15px; border-radius: 12px; text-align: right; font-family: monospace; font-size: 18px; margin-bottom: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { background: #ccc; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
        .tab.active { background: #0277bd; color: white; }
        .panel { display: none; background: white; border-radius: 20px; padding: 20px; }
        .panel.active { display: block; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #0277bd; color: white; }
        .status { padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .status-reg { background: #2196f3; color: white; }
        .status-board { background: #ff9800; color: white; }
        .status-dep { background: #4caf50; color: white; }
        .status-wait { background: #9e9e9e; color: white; }
        input, button { padding: 10px; margin: 5px 0; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .btn { background: #0277bd; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .edit-btn, .delete-btn { padding: 5px 10px; margin: 0 5px; border: none; border-radius: 5px; cursor: pointer; }
        .edit-btn { background: #ff9800; }
        .delete-btn { background: #f44336; color: white; }
        .edit-panel { background: #f0f8ff; border: 2px solid #0277bd; border-radius: 15px; padding: 20px; margin-top: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>✈️ Аэропорт Свердловский</h1>
        <p>Екатеринбург | SRD | GMT+5</p>
    </div>
    <div class="time" id="time"></div>
    <div class="tabs">
        <button class="tab active" onclick="showPanel('tablo')">📋 Табло</button>
        <button class="tab" onclick="showPanel('admin')">⚙️ Админ</button>
    </div>
    <div id="tabloPanel" class="panel active"><div style="overflow-x:auto;"><table><thead><tr><th>Время</th><th>Рейс</th><th>Направление</th><th>Код</th><th>Ожидание</th><th>Статус</th></tr></thead><tbody id="tabloBody"></tbody></table></div></div>
    <div id="adminPanel" class="panel"><div id="adminArea"></div></div>
</div>
<script>
    // ===== ВСТАВЬ СВОИ ДАННЫЕ =====
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQbCL3cfONxrIJlM5Lf-Xckeyd4m-1coUvkjGJlvxgg8vF-fbcIuJwZhGCPCkThOLAFCvlYXG1hC8aM/pub?output=csv";
    const API_URL = "https://script.google.com/macros/s/AKfycbzySwVNxQnRB-Rnqt8KifTsiCI5hMs64AJCQghi3sOwnjsc2so8-SqD9o3jAxVkXBe_pQ/exec";
    // ===============================
    
    let flights = [];
    let editId = null;
    
    function getEkbTime() {
        const now = new Date();
        return new Date(now.getTime() + (5 * 60 - now.getTimezoneOffset()) * 60000);
    }
    
    async function loadFromSheets() {
        try {
            const res = await fetch(CSV_URL + '?t=' + Date.now());
            const text = await res.text();
            const rows = text.split('\n');
            flights = [];
            for(let i=1; i<rows.length; i++) {
                const cols = rows[i].split(',');
                if(cols.length>=5 && cols[0] && cols[0]!=='id') {
                    flights.push({
                        id: parseInt(cols[0]) || i,
                        flightNumber: cols[1]?.trim(),
                        destination: cols[2]?.trim(),
                        iataCode: cols[3]?.trim(),
                        departureTime: cols[4]?.trim(),
                        expectedTime: cols[5]?.trim() || '',
                        regStart: cols[6]?.trim() || '',
                        regEnd: cols[7]?.trim() || '',
                        boardingStart: cols[8]?.trim() || '',
                        boardingEnd: cols[9]?.trim() || ''
                    });
                }
            }
            renderTablo();
        } catch(e) { console.error(e); }
    }
    
    function getStatus(f) {
        const now = getEkbTime();
        const dep = new Date(f.departureTime);
        const rs = f.regStart ? new Date(f.regStart) : null;
        const re = f.regEnd ? new Date(f.regEnd) : null;
        const bs = f.boardingStart ? new Date(f.boardingStart) : null;
        const be = f.boardingEnd ? new Date(f.boardingEnd) : null;
        if(now > dep) return { text: 'ВЫЛЕТЕЛ', class: 'status-dep' };
        if(be && now > be) return { text: 'ПОСАДКА ЗАКРЫТА', class: 'status-wait' };
        if(bs && now >= bs) return { text: 'ПОСАДКА', class: 'status-board' };
        if(re && now > re) return { text: 'РЕГИСТРАЦИЯ ЗАКРЫТА', class: 'status-wait' };
        if(rs && now >= rs) return { text: 'РЕГИСТРАЦИЯ', class: 'status-reg' };
        return { text: 'ОЖИДАЕТСЯ', class: 'status-wait' };
    }
    
    function renderTablo() {
        const sorted = [...flights].sort((a,b)=>new Date(a.departureTime)-new Date(b.departureTime));
        document.getElementById('tabloBody').innerHTML = sorted.map(f=>{
            const s = getStatus(f);
            const dep = new Date(f.departureTime);
            const exp = f.expectedTime ? new Date(f.expectedTime) : null;
            return `<tr><td>${dep.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}</td><td><b>${f.flightNumber}</b></td><td>${f.destination}</td><td>${f.iataCode}</td><td>${exp?exp.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}):'—'}</td><td><span class="status ${s.class}">${s.text}</span></td></tr>`;
        }).join('');
    }
    
    async function renderAdmin() {
        const area = document.getElementById('adminArea');
        area.innerHTML = `
            <h3>➕ Добавить</h3>
            <form id="addForm"><div class="form-row"><input placeholder="Номер" id="fn" required><input placeholder="Направление" id="dest" required><input placeholder="Код IATA" id="code" required></div>
            <div class="form-row"><input type="datetime-local" id="dt" required><input type="datetime-local" id="exp"></div>
            <div class="form-row"><input type="datetime-local" id="rs" placeholder="Регистрация начало"><input type="datetime-local" id="re" placeholder="Регистрация конец"></div>
            <div class="form-row"><input type="datetime-local" id="bs" placeholder="Посадка начало"><input type="datetime-local" id="be" placeholder="Посадка конец"></div>
            <button type="submit" class="btn">✈️ Добавить</button></form>
            <h3>📋 Список</h3><div style="overflow-x:auto;"><table><thead><tr><th>Рейс</th><th>Направление</th><th>Время</th><th>Статус</th><th></th></tr></thead><tbody id="adminList"></tbody></table></div>
            <div id="editBlock" class="edit-panel hidden"><h3>✏️ Редактировать</h3><div class="form-row"><input id="e_fn" placeholder="Номер"><input id="e_dest" placeholder="Направление"><input id="e_code" placeholder="Код"></div>
            <div class="form-row"><input type="datetime-local" id="e_dt"><input type="datetime-local" id="e_exp"></div>
            <div class="form-row"><input type="datetime-local" id="e_rs"><input type="datetime-local" id="e_re"><input type="datetime-local" id="e_bs"><input type="datetime-local" id="e_be"></div>
            <button onclick="saveEdit()" class="btn">💾 Сохранить</button><button onclick="cancelEdit()" class="btn">❌ Отмена</button></div>
        `;
        document.getElementById('adminList').innerHTML = flights.map(f=>{
            const s = getStatus(f);
            const dep = new Date(f.departureTime);
            return `<tr><td>${f.flightNumber}</td><td>${f.destination} (${f.iataCode})</td><td>${dep.toLocaleString()}</td><td><span class="status ${s.class}">${s.text}</span></td><td><button class="edit-btn" onclick="openEdit(${f.id})">Ред</button><button class="delete-btn" onclick="deleteFlight(${f.id})">Удл</button></td></tr>`;
        }).join('');
        document.getElementById('addForm')?.addEventListener('submit', addFlight);
    }
    
    async function addFlight(e) {
        e.preventDefault();
        const flight = {
            flightNumber: document.getElementById('fn').value,
            destination: document.getElementById('dest').value,
            iataCode: document.getElementById('code').value,
            departureTime: document.getElementById('dt').value,
            expectedTime: document.getElementById('exp').value || '',
            regStart: document.getElementById('rs').value || '',
            regEnd: document.getElementById('re').value || '',
            boardingStart: document.getElementById('bs').value || '',
            boardingEnd: document.getElementById('be').value || ''
        };
        await fetch(API_URL, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(flight) });
        alert('Добавлено!');
        loadFromSheets();
        renderAdmin();
        e.target.reset();
    }
    
    async function openEdit(id) {
        const f = flights.find(f=>f.id===id);
        if(!f) return;
        editId = id;
        document.getElementById('e_fn').value = f.flightNumber;
        document.getElementById('e_dest').value = f.destination;
        document.getElementById('e_code').value = f.iataCode;
        document.getElementById('e_dt').value = f.departureTime.slice(0,16);
        document.getElementById('e_exp').value = f.expectedTime?.slice(0,16)||'';
        document.getElementById('e_rs').value = f.regStart?.slice(0,16)||'';
        document.getElementById('e_re').value = f.regEnd?.slice(0,16)||'';
        document.getElementById('e_bs').value = f.boardingStart?.slice(0,16)||'';
        document.getElementById('e_be').value = f.boardingEnd?.slice(0,16)||'';
        document.getElementById('editBlock').classList.remove('hidden');
    }
    
    async function saveEdit() {
        const flight = {
            id: editId,
            flightNumber: document.getElementById('e_fn').value,
            destination: document.getElementById('e_dest').value,
            iataCode: document.getElementById('e_code').value,
            departureTime: document.getElementById('e_dt').value,
            expectedTime: document.getElementById('e_exp').value || '',
            regStart: document.getElementById('e_rs').value || '',
            regEnd: document.getElementById('e_re').value || '',
            boardingStart: document.getElementById('e_bs').value || '',
            boardingEnd: document.getElementById('e_be').value || ''
        };
        await fetch(API_URL, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(flight) });
        alert('Сохранено!');
        cancelEdit();
        loadFromSheets();
        renderAdmin();
    }
    
    function cancelEdit() { document.getElementById('editBlock').classList.add('hidden'); editId = null; }
    async function deleteFlight(id) { if(confirm('Удалить?')) { await fetch(API_URL+'?id='+id, { method: 'DELETE' }); loadFromSheets(); renderAdmin(); } }
    function showPanel(p) { document.querySelectorAll('.panel').forEach(i=>i.classList.remove('active')); document.querySelectorAll('.tab').forEach(i=>i.classList.remove('active')); document.getElementById(p+'Panel').classList.add('active'); event.target.classList.add('active'); if(p==='admin') renderAdmin(); }
    function updateTime() { document.getElementById('time').innerHTML = `🕐 ${getEkbTime().toLocaleString('ru-RU')} (Екатеринбург, GMT+5)`; renderTablo(); }
    
    loadFromSheets();
    updateTime();
    setInterval(updateTime, 1000);
    setInterval(loadFromSheets, 30000);
</script>
</body>
</html>
